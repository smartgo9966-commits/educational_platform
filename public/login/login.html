<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1E90FF">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Smart Go — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/css/reset.css">
  <link rel="stylesheet" href="../shared/css/variables.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <link rel="stylesheet" href="./login.css">
  <link rel="stylesheet" href="../shared/css/responsive.css">
</head>
<body>
  <div class="login-page">
    <div class="card login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-logo">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="10" fill="url(#logo-grad)"/>
            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40">
                <stop stop-color="#1E90FF"/>
                <stop offset="1" stop-color="#00D1B2"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="login-title">Smart Go</h1>
        <p class="login-subtitle">Sign in to your account</p>
      </div>

      <!-- Role selector -->
      <div class="role-selector" role="group" aria-label="Select your role">
        <button class="role-pill active" data-role="admin">Admin</button>
        <button class="role-pill" data-role="teacher">Teacher</button>
        <button class="role-pill" data-role="student">Student</button>
      </div>

      <!-- Error message -->
      <div id="error-msg" class="login-error hidden" role="alert"></div>

      <!-- Sign in form -->
      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label class="sr-only" for="email">Email address</label>
          <input
            id="email"
            class="input"
            type="email"
            placeholder="Email address"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="sr-only" for="password">Password</label>
          <div class="input-wrapper">
            <input
              id="password"
              class="input"
              type="password"
              placeholder="Password"
              autocomplete="current-password"
              required
            >
            <button type="button" class="input-action" id="toggle-pw" aria-label="Toggle password visibility">
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg login-submit" id="signin-btn">
          Sign In
        </button>
      </form>

      <!-- Forgot password -->
      <div class="login-footer">
        <button type="button" class="link" id="forgot-pw">Forgot password?</button>
      </div>

    </div>
  </div>

  <script type="module" src="./login.js"></script>
</body>
</html>
