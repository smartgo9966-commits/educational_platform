<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Go</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./shared/css/reset.css">
  <link rel="stylesheet" href="./shared/css/variables.css">
  <link rel="stylesheet" href="./shared/css/base.css">
  <style>
    .splash {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(30, 144, 255, 0.10), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 209, 178, 0.10), transparent 50%),
        var(--bg-app);
    }
    .splash-inner { text-align: center; }
    .splash-title {
      font: 700 40px/1.1 var(--font-display);
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1E90FF, #00D1B2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .splash-sub { color: var(--text-tertiary); font-size: 14px; }
    .loader {
      width: 32px; height: 32px;
      border: 3px solid var(--border-default);
      border-top-color: var(--primary-blue);
      border-radius: 50%;
      animation: spin 600ms linear infinite;
      margin: 24px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-inner">
      <div class="splash-title">Smart Go</div>
      <div class="splash-sub">Redirecting…</div>
      <div class="loader"></div>
    </div>
  </div>
  <script type="module">
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { auth } from './shared/js/firebase-config.js';
    import { redirectByRole } from './shared/js/router.js';

    onAuthStateChanged(auth, async (user) => {
      const base = window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
      if (!user) {
        window.location.href = base + '/login/login.html';
        return;
      }
      try {
        const token = await user.getIdTokenResult();
        const role  = token.claims.role;
        if (role) {
          redirectByRole(role);
        } else {
          window.location.href = base + '/login/login.html';
        }
      } catch {
        window.location.href = base + '/login/login.html';
      }
    });
  </script>
</body>
</html>
