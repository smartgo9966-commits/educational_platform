<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1E90FF">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Smart Go — Student</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/css/reset.css">
  <link rel="stylesheet" href="../shared/css/variables.css">
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/components.css">
  <link rel="stylesheet" href="./student.css">
  <link rel="stylesheet" href="../shared/css/responsive.css">
</head>
<body>

  <div class="loader-bar hidden" id="loader"></div>

  <!-- ===== Student Header ===== -->
  <header class="student-header">
    <a href="../index.html" class="student-wordmark">Smart Go</a>

    <div class="student-header-right">
      <!-- Search icon toggle -->
      <button class="student-icon-btn" id="search-toggle" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>

      <!-- User -->
      <div class="student-user account-trigger" id="account-trigger" role="button" tabindex="0" aria-label="View account details">
        <span class="student-user-name" id="user-display-name">Student</span>
        <div class="student-avatar" id="user-avatar">S</div>
      </div>

      <button class="btn btn-ghost btn-sm" id="signout-btn">Sign out</button>
    </div>
  </header>

  <!-- Search bar (revealed on toggle) -->
  <div class="student-search-bar hidden" id="search-bar">
    <div class="student-search-inner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-tertiary);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" class="student-search-input" id="search-input" placeholder="Search materials…" autocomplete="off">
      <button class="btn btn-ghost btn-sm" id="search-close">✕</button>
    </div>
  </div>

  <!-- ===== Page body ===== -->
  <div class="student-body">

    <!-- Greeting -->
    <section class="student-greeting">
      <p class="greeting-pre">Welcome back,</p>
      <h1 class="greeting-name" id="greeting-name">Student</h1>
      <p class="greeting-sub">Here are your learning materials.</p>
    </section>

    <!-- Filter pills -->
    <div class="filter-pills" role="group" aria-label="Filter by category">
      <button class="filter-pill active" data-cat="all">All</button>
      <button class="filter-pill" data-cat="assignment">Assignments</button>
      <button class="filter-pill" data-cat="lesson">Lessons</button>
      <button class="filter-pill" data-cat="note">Notes</button>
      <button class="filter-pill" data-cat="smartboard">Smart Board</button>
      <button class="filter-pill" data-cat="other">Other</button>
    </div>

    <!-- Files grid -->
    <div class="files-grid" id="files-grid">
      <div class="files-loading" id="files-loading">
        <div class="loader-spinner"></div>
      </div>
    </div>

    <!-- Empty state -->
    <div class="student-empty hidden" id="empty-state">
      <div class="empty-icon">📚</div>
      <h3>Nothing here yet</h3>
      <p id="empty-msg">Your teacher hasn't uploaded anything in this category yet.</p>
    </div>

  </div>

  <!-- ===== Footer ===== -->
  <footer class="student-footer">
    <p class="footer-copy">© 2026 Smart Go Learning. All rights reserved.</p>
    <nav class="footer-links">
      <a href="mailto:smart.go.9966@gmail.com">Contact support</a>
    </nav>
  </footer>

  <!-- ===== File Details Modal ===== -->
  <div class="modal-backdrop hidden" id="file-modal">
    <div class="modal modal-file">
      <h3 class="modal-title" id="file-modal-title">File</h3>

      <img id="file-modal-preview" alt="File preview">

      <dl class="file-details">
        <div class="file-detail-row">
          <dt>Teacher</dt><dd id="file-modal-teacher">—</dd>
        </div>
        <div class="file-detail-row">
          <dt>Subject</dt><dd id="file-modal-subject">—</dd>
        </div>
        <div class="file-detail-row">
          <dt>Type</dt><dd id="file-modal-type">—</dd>
        </div>
        <div class="file-detail-row">
          <dt>Date</dt><dd id="file-modal-date">—</dd>
        </div>
      </dl>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="file-modal-close">Close</button>
        <a class="btn btn-primary" id="file-open" href="#" target="_blank" rel="noopener">Open file</a>
      </div>
    </div>
  </div>

  <script type="module" src="./student.js"></script>
</body>
</html>
