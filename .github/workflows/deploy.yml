name: Deploy to Firebase

# Spark (free) plan: deploys Hosting + Firestore rules/indexes + Storage rules.
# Cloud Functions are NOT deployed (Functions require the Blaze plan).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@^13.0.0

      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> $GITHUB_ENV

      - name: Deploy Hosting + Firestore rules + indexes
        # NOTE: 'storage' is intentionally NOT deployed. Firebase Storage was
        # never initialized for this project, and we use Cloudinary for all
        # uploads. To re-enable storage rule deploys: initialize Firebase
        # Storage in the Firebase Console first, then add 'storage' back to
        # the --only flag below.
        run: firebase deploy --only hosting,firestore:rules,firestore:indexes --project educationalplatform-e744b --non-interactive
